# Two-Tier State File Template
# Created by the Orchestrator when a task enters the Build phase.
# Tracks both high-level phases and per-issue progress.

task: "<feature title from PRD>"
status: in_progress  # in_progress | completed | blocked

# Phase tracking (top tier)
current_phase: build  # understand | specify | decompose | build | review
phases:
  understand: done      # Planner completed grilling
  specify: done         # Spec Writer produced PRD
  decompose: done       # Task Decomposer produced issues
  build: in_progress    # Orchestrator executing issues
  review: pending       # Architecture Reviewer waiting

# Issue tracking (second tier, only during build phase)
current_issue: 1
issues:
  - id: 1
    title: "<tracer bullet — first end-to-end slice>"
    agents: [be-developer, fe-developer]
    blocked_by: []
    status: pending  # pending | in_progress | done | failed

  - id: 2
    title: "<second issue title>"
    agents: [be-developer]
    blocked_by: [1]
    status: pending

  - id: 3
    title: "<third issue title>"
    agents: [fe-developer]
    blocked_by: [1]
    status: pending

# Orchestrator updates this file after each agent completes work.
# When all issues are done, current_phase advances to "review".
